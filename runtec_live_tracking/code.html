<body class="text-on-surface font-body-md overflow-hidden h-screen flex flex-col">

<!-- Main Content -->

<!-- Timer Section -->

</div>

</div>

<span class="font-label-caps text-label-caps text-on-surface-variant/60 mb-2 italic">CURR. PACE</span>

<span class="material-symbols-outlined text-[12px]">bluetooth</span> PAIR HR SENSOR
</button>
</div>
<div class="absolute bottom-4 right-4 z-10">
<span class="font-headline-md text-headline-md text-primary italic"><span id="hr-display">0</span> BPM</span>
</div>
<!-- Simple SVG Waveform Animation -->
<svg class="absolute inset-0 w-full h-full" preserveAspectRatio="none" viewBox="0 0 400 100">
<path class="opacity-40" d="M 0 50 L 400 50" fill="none" id="wave" stroke="#c7f300" stroke-width="2"></path>
</svg>
</div>
<!-- Mini Map Preview / Location -->
<div class="w-full glass-card rounded-xl p-4 flex items-center justify-between">

<div class="w-12 h-12 rounded bg-surface-container-highest flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover opacity-50" data-alt="A stylized digital map interface showing a GPS running route through a modern urban landscape at dusk. The path is highlighted in a vibrant electric lime neon glow against a dark charcoal and slate gray background. Minimalist aesthetic with high contrast and tech-inspired details." data-location="Seoul" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA3Kcth9E2T7AC0YGYqaAtZcUR2CuY5WuNoJAlFBszcOnMkE-AYsrvQRSJjQGNV-XfhDtTBcpqhmPM631S4iEFS0-KsgVIZRJGCK0N9fPRN7EL2sQFLU7Qy3fSooaNefe29hdOyMz66Fh66JOf8C5oFP_to78-xFGX7eEVpbDW0v3bejuGQyAs_5q0Azd-8-Y6UdHarXyz_axm99CyIsZXUBXEg_P3x8Aobl8Spb0O1ufgZIYt0hsqqnepAZWNmZarEBhsnyRXU5dIX">
</div>
<div>
<p class="font-label-caps text-[10px] text-on-surface-variant/60 italic">CURRENT GPS COORDINATES</p>

<!-- Footer Action Controls (No Nav) -->
<div class="fixed bottom-0 left-0 w-full px-margin-mobile pb-12 pt-8 flex gap-4 bg-gradient-to-t from-background via-background/80 to-transparent">
<button id="pause-btn" onclick="togglePauseLiveSession()" class="flex-1 h-16 rounded-full border-2 border-primary-container text-primary-container font-headline-md italic uppercase transition-all active:scale-95 flex items-center justify-center gap-2">
<span id="pause-icon" class="material-symbols-outlined">pause</span>

</button>
<button id="stop-btn" onclick="stopLiveSession()" class="flex-1 h-16 rounded-full bg-secondary-container text-on-secondary-container font-headline-md italic uppercase transition-all active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">stop</span>
            STOP
        </button>

<script>
        // Waveform Animation State
        const wave = document.getElementById('wave');
        let offset = 0;
        let waveAmplitude = 3; // Starting flat/small ripple since HR is 0
        let waveSpeed = 0.5;
        let isPaused = false;
        
        function animateWave() {
            if (!isPaused) {
                offset += waveSpeed * 4;
            }
            const points = [];
            for (let i = 0; i <= 400; i += 20) {
                // If paused, drop amplitude to resting ripple
                const amp = isPaused ? 2 : waveAmplitude;
                const y = 50 + Math.sin((i + offset) * 0.05) * amp;
                points.push(`${i} ${y}`);
            }
            wave.setAttribute('d', `M ${points.join(' L ')}`);
            requestAnimationFrame(animateWave);
        }
        
        animateWave();

        // Timer State
        let seconds = 0;
        const timerElement = document.getElementById('timer-display');
        let timerInterval = null;

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (isPaused) return;
                seconds++;
                const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
                const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                timerElement.textContent = `${h}:${m}:${s}`;
            }, 1000);
        }
        startTimer();

        // Geolocation tracking
        let watchId = null;
        let lastCoord = null;
        let totalDistance = 0.0;

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Earth's radius in km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = 
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function startGPSTracking() {
            if ("geolocation" in navigator) {
                watchId = navigator.geolocation.watchPosition(
                    (position) => {
                        if (isPaused) return;
                        const { latitude, longitude, speed, accuracy } = position.coords;

                        // Display current coordinates
                        document.getElementById('location-display').textContent = 
                            `${latitude.toFixed(6)}° N, ${longitude.toFixed(6)}° E`;

                        // Skip high accuracy variance
                        if (accuracy > 50) return;

                        if (lastCoord) {
                            const dist = calculateDistance(
                                lastCoord.latitude,
                                lastCoord.longitude,
                                latitude,
                                longitude
                            );
                            totalDistance += dist;
                        }
                        lastCoord = { latitude, longitude };

                        // Update UI
                        document.getElementById('distance-display').textContent = totalDistance.toFixed(2);

                        // Pace calculation
                        const paceEl = document.getElementById('pace-display');
                        if (speed && speed > 0.5) {
                            const paceMinPerKm = 16.6667 / speed; // 1000 / (speed * 60)
                            const mins = Math.floor(paceMinPerKm);
                            const secs = Math.floor((paceMinPerKm - mins) * 60).toString().padStart(2, '0');
                            paceEl.textContent = `${mins}:${secs}`;
                        } else if (totalDistance > 0.01) {
                            const elapsedMins = seconds / 60;
                            const paceMinPerKm = elapsedMins / totalDistance;
                            const mins = Math.floor(paceMinPerKm);
                            const secs = Math.floor((paceMinPerKm - mins) * 60).toString().padStart(2, '0');
                            paceEl.textContent = `${mins}:${secs}`;
                        } else {
                            paceEl.textContent = "0:00";
                        }
                    },
                    (error) => {
                        console.warn("Geolocation watch error:", error);
                        document.getElementById('location-display').textContent = "GPS SERVICE ERROR";
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    }
                );
            } else {
                document.getElementById('location-display').textContent = "GPS NOT SUPPORTED";
            }
        }
        startGPSTracking();

        // Web Bluetooth Heart Rate API Integration
        let bluetoothDevice = null;
        let hrCharacteristic = null;
        let currentBPM = 0;

        async function requestHeartRatePermission() {
            try {
                const btn = document.getElementById('connect-hr-btn');
                if (btn) btn.innerHTML = '<span class="material-symbols-outlined text-[12px] animate-spin">sync</span> PAIRING...';

                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['heart_rate'] }]
                });

                bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);

                const server = await bluetoothDevice.gatt.connect();
                const service = await server.getPrimaryService('heart_rate');
                hrCharacteristic = await service.getCharacteristic('heart_rate_measurement');

                await hrCharacteristic.startNotifications();
                hrCharacteristic.addEventListener('characteristicvaluechanged', handleHeartRateChanged);

                if (btn) {
                    btn.innerHTML = '<span class="material-symbols-outlined text-[12px] text-green-400">bluetooth_connected</span> CONNECTED';
                    btn.classList.remove('border-white/10');
                    btn.classList.add('border-green-500/50');
                }
            } catch (error) {
                console.error("Bluetooth Connection Error:", error);
                const btn = document.getElementById('connect-hr-btn');
                if (btn) btn.innerHTML = '<span class="material-symbols-outlined text-[12px] text-red-400">warning</span> PAIR FAILED';
                setTimeout(() => {
                    if (btn) {
                        btn.innerHTML = '<span class="material-symbols-outlined text-[12px]">bluetooth</span> PAIR HR SENSOR';
                        btn.classList.remove('border-green-500/50');
                        btn.classList.add('border-white/10');
                    }
                }, 3000);
            }
        }

        function onDisconnected() {
            console.log("Heart Rate sensor disconnected.");
            document.getElementById('hr-display').textContent = "0";
            currentBPM = 0;
            waveAmplitude = 3;
            waveSpeed = 0.5;
            const btn = document.getElementById('connect-hr-btn');
            if (btn) {
                btn.innerHTML = '<span class="material-symbols-outlined text-[12px]">bluetooth</span> PAIR HR SENSOR';
                btn.classList.remove('border-green-500/50');
                btn.classList.add('border-white/10');
            }
        }

        function handleHeartRateChanged(event) {
            const value = event.target.value;
            const flags = value.getUint8(0);
            const rate16Bits = flags & 0x1;
            let heartRate;
            if (rate16Bits) {
                heartRate = value.getUint16(1, true);
            } else {
                heartRate = value.getUint8(1);
            }

            currentBPM = heartRate;
            document.getElementById('hr-display').textContent = heartRate;

            // Animate waveform based on actual BPM
            if (heartRate > 0) {
                waveAmplitude = 15 + (heartRate - 60) * 0.15;
                waveSpeed = 0.5 + (heartRate - 60) * 0.015;
            } else {
                waveAmplitude = 3;
                waveSpeed = 0.5;
            }
        }

        // Live Controls (Pause/Resume/Stop)
        function togglePauseLiveSession() {
            isPaused = !isPaused;
            const pauseIcon = document.getElementById('pause-icon');
            const pauseText = document.getElementById('pause-text');

            if (isPaused) {
                if (pauseIcon) pauseIcon.textContent = "play_arrow";
                if (pauseText) pauseText.textContent = "RESUME";
            } else {
                if (pauseIcon) pauseIcon.textContent = "pause";
                if (pauseText) pauseText.textContent = "PAUSE";
            }
        }

        function stopLiveSession() {
            isPaused = true;
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
            }
            if (bluetoothDevice && bluetoothDevice.gatt.connected) {
                bluetoothDevice.gatt.disconnect();
            }

            alert(`RUN SUMMARY\n----------------\nElapsed Time: ${timerElement.textContent}\nDistance: ${totalDistance.toFixed(2)} KM\nAvg Pace: ${document.getElementById('pace-display').textContent} /KM\nHeart Rate: ${currentBPM > 0 ? currentBPM + ' BPM' : 'Not Measured'}`);
            
            // Reset to 0
            seconds = 0;
            totalDistance = 0.0;
            lastCoord = null;
            timerElement.textContent = "00:00:00";
            document.getElementById('distance-display').textContent = "0.00";
            document.getElementById('pace-display').textContent = "0:00";
            document.getElementById('hr-display').textContent = "0";
            document.getElementById('location-display').textContent = "WAITING FOR GPS...";
            isPaused = false;
            
            // Re-start GPS tracking
            startGPSTracking();
        }
    </script>
</body></html>
