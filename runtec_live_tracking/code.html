<script>
        // Simple micro-interaction for the heart rate wave
        const wave = document.getElementById('wave');
        let offset = 0;
        
        function animateWave() {
            offset += 2;
            const points = [];
            for (let i = 0; i <= 400; i += 20) {
                const y = 50 + Math.sin((i + offset) * 0.05) * 20;
                points.push(`${i} ${y}`);
            }
            wave.setAttribute('d', `M ${points.join(' L ')}`);
            requestAnimationFrame(animateWave);
        }
        
        animateWave();

        // Simulate timer increment
        let seconds = 765; // 12:45
        const timerElement = document.querySelector('h1');
        
        setInterval(() => {
            seconds++;
            const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            timerElement.textContent = `${h}:${m}:${s}`;
        }, 1000);
    </script>
