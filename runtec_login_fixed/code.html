<body class="bg-background text-on-surface font-body-md text-body-md italic-force">
<!-- Global Layout Wrapper -->
<main class="relative w-full flex flex-col items-center slate-bg min-h-screen py-12">
<!-- Overlay for atmospheric depth -->
<div class="absolute inset-0 bg-gradient-to-t from-background/90 via-transparent to-background/40 pointer-events-none"></div>
<!-- Content Container -->
<div class="relative z-10 w-full max-w-md px-margin-mobile flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-stack-lg animate-pulse">
<h1 class="sr-only">RUNTEC</h1>
</div>
<!-- Login Form Card -->
<div class="glass-container w-full p-8 rounded-xl flex flex-col gap-stack-md border-primary-fixed/20 shadow-2xl">
<div class="text-center">
<h2 class="font-headline-md text-headline-md italic font-black uppercase tracking-widest text-primary-fixed mb-1">
                        Athlete Access
                    </h2>
<p class="font-label-caps text-label-caps text-on-surface-variant opacity-60">
                        ENTER YOUR PERFORMANCE CREDENTIALS
                    </p>
</div>
<form class="flex flex-col gap-gutter" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps ml-1 text-primary-fixed/80">EMAIL_ADDRESS</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary-fixed/40 group-focus-within:text-primary-fixed transition-colors">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-lowest/40 border-2 border-primary-fixed/30 rounded-lg text-primary-fixed focus:border-primary-fixed focus:ring-0 focus:outline-none transition-all duration-300 placeholder:text-on-surface-variant/30 font-bold italic" placeholder="RUNNER@RUNTEC.IO" type="email">
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps ml-1 text-primary-fixed/80">SECURE_KEY</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary-fixed/40 group-focus-within:text-primary-fixed transition-colors">lock</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-lowest/40 border-2 border-primary-fixed/30 rounded-lg text-primary-fixed focus:border-primary-fixed focus:ring-0 focus:outline-none transition-all duration-300 placeholder:text-on-surface-variant/30 font-bold italic" placeholder="••••••••" type="password">
</div>
</div>
<!-- Login Button -->
<button class="mt-stack-sm w-full py-5 bg-primary-fixed hover:bg-primary-fixed-dim text-background font-headline-md font-black italic rounded-lg transition-all duration-200 transform active:scale-[0.98] shadow-[0_0_20px_rgba(199,243,0,0.4)] uppercase">
                        START RUNNING
                    </button>
</form>
<!-- Footer Links -->
<div class="flex flex-col items-center gap-stack-sm mt-4">
<a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary-fixed transition-colors duration-200" href="#">
                        FORGOT PASSWORD?
                    </a>
<div class="h-[1px] w-12 bg-white/10 my-2"></div>
<p class="font-body-md text-body-md text-on-surface-variant italic">
                        NEW TO THE TRACK? 
                        <a class="text-primary-fixed font-black hover:underline ml-1" href="#">SIGN UP</a>
</p>
</div>
</div>
<!-- Atmospheric Bottom Text -->
<div class="mt-stack-lg flex flex-col items-center gap-2 opacity-30">
<p class="font-label-caps text-[10px] tracking-[0.5em] text-on-surface">PRECISION. PERFORMANCE. PACE.</p>
<div class="flex gap-4">
<span class="material-symbols-outlined text-[16px]">fitness_center</span>
<span class="material-symbols-outlined text-[16px]">speed</span>
<span class="material-symbols-outlined text-[16px]">route</span>
</div>
</div>
</div>
</main>
<script>
        // Subtle Mouse Interaction for Glass Tilt
        const card = document.querySelector('.glass-container');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 60;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 60;
            if (card) card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Click interaction for button
        const btn = document.querySelector('button');
        if (btn) {
            btn.addEventListener('click', () => {
                const originalText = btn.innerHTML;
                btn.innerHTML = 'PREPARING ENGINE...';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                }, 2000);
            });
        }
    </script>
